name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    name: Java ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [11, 17, 21]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: cljdeps-${{ runner.os }}-java-${{ matrix.java }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            cljdeps-${{ runner.os }}-java-${{ matrix.java }}-
            cljdeps-${{ runner.os }}-

      - name: Lint
        run: clojure -M:lint

      - name: Test
        run: clojure -M:test

      - name: Build jar
        run: clojure -T:build jar
