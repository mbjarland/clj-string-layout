name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    name: JVM tests on Java ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [11, 17, 21]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
          bb: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: cljdeps-${{ runner.os }}-java-${{ matrix.java }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            cljdeps-${{ runner.os }}-java-${{ matrix.java }}-
            cljdeps-${{ runner.os }}-

      - name: Lint
        run: clojure -M:lint

      - name: Reflection check
        run: |
          out=$(clojure -M -e "
            (set! *warn-on-reflection* true)
            (require 'clj-string-layout.core 'clj-string-layout.cli
                     'clj-string-layout.escape 'clj-string-layout.impl.box
                     'clj-string-layout.impl.config 'clj-string-layout.impl.parser
                     'clj-string-layout.impl.render 'clj-string-layout.layout
                     'clj-string-layout.predicates 'clj-string-layout.presets
                     'clj-string-layout.table 'clj-string-layout.width)
            (println 'OK)
          " 2>&1)
          echo "$out"
          if echo "$out" | grep -qE "Reflection warning|primitive local"; then
            echo "::error::Reflection or boxing warning detected"
            exit 1
          fi

      - name: Test
        run: clojure -M:test

      - name: Babashka test
        run: bb bb-test

      - name: Babashka smoke require
        run: bb -e "(require '[clj-string-layout.table :as t]) (println (t/table-str {:format :box :headers [\"A\"] :rows [[\"x\"]]}))"

      - name: Build jar
        run: clojure -T:build jar
