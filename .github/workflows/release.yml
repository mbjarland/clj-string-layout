name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify Java ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [11, 17, 21]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
          bb: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: cljdeps-${{ runner.os }}-java-${{ matrix.java }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            cljdeps-${{ runner.os }}-java-${{ matrix.java }}-
            cljdeps-${{ runner.os }}-

      - name: Lint
        run: clojure -M:lint

      - name: Test
        run: clojure -M:test

      - name: Babashka test
        run: bb bb-test

      - name: Build jar
        run: clojure -T:build jar

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: cljdeps-${{ runner.os }}-release-${{ hashFiles('deps.edn') }}
          restore-keys: |
            cljdeps-${{ runner.os }}-release-
            cljdeps-${{ runner.os }}-

      - name: Validate tag matches version.edn
        run: |
          version="$(clojure -M -e "(require '[clojure.edn :as edn]) (print (:version (edn/read-string (slurp \"version.edn\"))))")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$version" ]; then
            printf 'Tag %s does not match version.edn %s\n' "$GITHUB_REF_NAME" "$version"
            exit 1
          fi

      - name: Build jar
        run: clojure -T:build jar

      - name: Deploy to Clojars
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: clojure -T:deploy deploy

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" target/*.jar --verify-tag --generate-notes
